name: Label untouched issues (K posouzení)

on:
  schedule:
    - cron: '0 2 * * *'  # denně ve 02:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  
jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Label untouched issues
        uses: actions/github-script@v7
        with:
          script: |
            const LABEL = "K posouzení";
            const DAYS = 7;
            const now = new Date();

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                per_page: 100
              }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const createdAt = new Date(issue.created_at);
              const ageDays = (now - createdAt) / (1000 * 60 * 60 * 24);

              if (ageDays < DAYS) continue;

              const hasLabel = issue.labels.some(l => l.name === LABEL);
              if (hasLabel) continue;

              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  per_page: 100
                }
              );

              const hasActivityAfterCreation = timeline.some(ev => {
                const evDate = new Date(ev.created_at);
                return evDate > createdAt;
              });

              if (!hasActivityAfterCreation) {
                console.log(`Adding label to #${issue.number}`);
                console.log(`[DRY RUN] Would label issue #${issue.number}`);
              }
            }

              
